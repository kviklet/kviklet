#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.session.store-type=jdbc
spring.main.lazy-initialization=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.jdbc.initialize-schema=ALWAYS
#logging.level.org.springframework.security=DEBUG
# Keep the chatty AWS SDK (used for IAM auth) quiet.
logging.level.software.amazon.awssdk=WARN
# Identify this service in structured (JSON) logs.
# service.name is hardcoded; service.version reuses app.version (set from the
# APP_VERSION build arg), the same value served to the frontend.
spring.application.name=Kviklet
logging.structured.ecs.service.version=${app.version}
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%t %a "%r" %s (%D ms)
